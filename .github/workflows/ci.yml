name: Android CI

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: 26.1.10909125
  JAVA_VERSION: '17'

jobs:
  # ---------------------------------------------------------------------------
  # Build — matrix: debug + release
  # ---------------------------------------------------------------------------
  build:
    name: Build APK (${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout THIS repo (no submodules yet — we do that manually)
      # -----------------------------------------------------------------------
      - name: Checkout xenia-android
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # 2. Register and shallow-clone the xenia-upstream submodule.
      #
      #    Why manual instead of `submodules: recursive`?
      #    - The upstream repo is ~500 MB; shallow clone cuts it to ~50 MB.
      #    - actions/checkout's built-in submodule support doesn't support
      #      per-submodule depth control.
      # -----------------------------------------------------------------------
      - name: Register xenia-upstream submodule
        run: |
          git submodule init
          git config submodule.xenia-upstream.url \
            https://github.com/xenia-project/xenia.git

      - name: Shallow-clone xenia-upstream
        run: |
          git submodule update \
            --init \
            --depth 1 \
            --jobs 4 \
            xenia-upstream
          echo "xenia-upstream HEAD: $(git -C xenia-upstream rev-parse HEAD)"

      # -----------------------------------------------------------------------
      # 3. Symlink src/ and third_party/ from the submodule
      # -----------------------------------------------------------------------
      - name: Run setup.sh
        run: |
          chmod +x setup.sh
          bash setup.sh

      - name: Verify source tree
        run: |
          echo "src/xenia dirs:"
          ls src/xenia/
          echo "third_party sample:"
          ls third_party/ | head -10

      # -----------------------------------------------------------------------
      # 4. JDK 17
      # -----------------------------------------------------------------------
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # -----------------------------------------------------------------------
      # 5. Android SDK + NDK r26
      # -----------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26 and CMake 3.22
        run: |
          sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            --channel=0
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}" \
            >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 6. Gradle wrapper — verify it exists (committed in repo)
      # -----------------------------------------------------------------------
      - name: Verify Gradle wrapper
        run: |
          test -f gradlew             || { echo "ERROR: gradlew missing";             exit 1; }
          test -f gradlew.bat         || { echo "ERROR: gradlew.bat missing";         exit 1; }
          test -f gradle/wrapper/gradle-wrapper.jar \
                                      || { echo "ERROR: gradle-wrapper.jar missing";  exit 1; }
          chmod +x gradlew
          echo "Gradle wrapper OK"

      # -----------------------------------------------------------------------
      # 7. Caches
      # -----------------------------------------------------------------------
      - name: Cache Gradle wrapper downloads
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle build caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      - name: Cache NDK / CMake build output
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-cxx-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('app/src/main/cpp/**', 'src/**/*.cc', 'src/**/*.h') }}
          restore-keys: |
            ndk-cxx-${{ runner.os }}-${{ matrix.build_type }}-

      # -----------------------------------------------------------------------
      # 8. Build
      # -----------------------------------------------------------------------
      - name: Build ${{ matrix.build_type }} APK
        run: |
          ./gradlew \
            "assemble$(echo "${{ matrix.build_type }}" | sed 's/./\u&/')" \
            --no-daemon \
            --stacktrace \
            --info \
            -Pandroid.useAndroidX=true

      # -----------------------------------------------------------------------
      # 9. Upload APK artifact
      # -----------------------------------------------------------------------
      - name: Locate APK
        id: apk_path
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xenia-android-${{ matrix.build_type }}-${{ github.sha }}
          path: app/build/outputs/apk/${{ matrix.build_type }}/
          if-no-files-found: error
          retention-days: 14

      # -----------------------------------------------------------------------
      # 10. Upload release symbols (release only)
      # -----------------------------------------------------------------------
      - name: Upload release symbols
        if: matrix.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: xenia-android-symbols-${{ github.sha }}
          path: |
            app/build/outputs/mapping/release/mapping.txt
            app/build/intermediates/merged_native_libs/release/
          retention-days: 14
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Lint — runs in parallel, no C++ needed
  # ---------------------------------------------------------------------------
  lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xenia-android
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Lint doesn't need C++, but Gradle needs src/ and third_party/ to exist
      # (CMakeLists is parsed lazily). Create empty stubs so the sync succeeds.
      - name: Create stub src/ and third_party/ for lint
        run: |
          mkdir -p src/xenia
          mkdir -p third_party

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Gradle wrapper
        run: |
          test -f gradlew && chmod +x gradlew || { echo "ERROR: gradlew missing"; exit 1; }

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
          if-no-files-found: warn
