name: Repository Debug

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Print environment
        run: |
          echo "===== Environment ====="
          pwd
          whoami
          git --version
          java -version || true

      - name: List repository contents
        run: |
          echo "===== Repository Root ====="
          ls -lah

          echo
          echo "===== Recursive Listing ====="
          find . -maxdepth 4

      - name: Git information
        run: |
          echo "===== Git Status ====="
          git status

          echo
          echo "===== Current Branch ====="
          git branch

          echo
          echo "===== Current Commit ====="
          git rev-parse HEAD

      - name: Check important files
        run: |
          echo "===== gradlew ====="
          ls -l gradlew || true

          echo
          echo "===== setup.sh ====="
          ls -l setup.sh || true

          echo
          echo "===== .gitmodules ====="
          cat .gitmodules || true

          echo
          echo "===== settings.gradle ====="
          ls -l settings.gradle settings.gradle.kts || true

          echo
          echo "===== build.gradle ====="
          ls -l build.gradle build.gradle.kts || true

      - name: Check submodules
        run: |
          echo "===== Submodule Status ====="
          git submodule status || true

          echo
          echo "===== xenia-upstream ====="
          ls -lah xenia-upstream || true

      - name: Check Android project
        run: |
          echo "===== app ====="
          ls -lah app || true

          echo
          echo "===== gradle ====="
          ls -lah gradle || true

      - name: Test gradlew
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew --version
          else
            echo "gradlew NOT FOUND!"
          fi
